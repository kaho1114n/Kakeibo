<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#EBDFB9">
<title>家計簿</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #D3BD8C; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* —————————————————————— */
/* 定数                                                           */
/* —————————————————————— */

const INCOME_CATEGORIES = ["給与", "副業", "お小遣い", "臨時収入", "ハピカ売上", "その他収入"];
const EXPENSE_CATEGORIES = [
  "食費", "日用品", "交通", "交際費", "趣味・娯楽",
  "住居", "光熱費", "通信費", "医療", "現場", "その他支出",
];
const INCOME_METHODS = [
  { id: "cash", label: "現金" },
  { id: "paypay", label: "PayPay" },
  { id: "bank", label: "銀行振込" },
];
const EXPENSE_METHODS = [
  { id: "cash", label: "現金" },
  { id: "paypay", label: "PayPay" },
  { id: "credit", label: "クレジットカード" },
  { id: "emoney", label: "電子マネー" },
];
const METHOD_LABEL = {
  cash: "現金", paypay: "PayPay", bank: "銀行振込", credit: "クレカ", emoney: "電子マネー",
};

const TABS = [
  { id: "record", label: "記帳", sub: "RECORD" },
  { id: "list", label: "一覧", sub: "LIST" },
  { id: "summary", label: "集計", sub: "SUMMARY" },
  { id: "assets", label: "資産", sub: "ASSETS" },
  { id: "data", label: "データ", sub: "BACKUP" },
];

const COLORS = {
  paper: "#EBDFB9",
  paperDark: "#DECBA0",
  paperDeep: "#D3BD8C",
  ink: "#2B2620",
  inkLight: "#6B5F4D",
  inkFaint: "#948868",
  income: "#3D6B4F",
  expense: "#A63D2F",
  credit: "#48577A",
  savings: "#8B6F3E",
  bank: "#3E6E71",
  wallet: "#8B5E34",
  emoney: "#A6447A",
  seal: "#B7410E",
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const thisMonthStr = () => todayStr().slice(0, 7);
const monthOf = (dateStr) => (dateStr || "").slice(0, 7);
const shiftMonth = (ym, delta) => {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};
const monthLabel = (ym) => {
  const [y, m] = ym.split("-").map(Number);
  return `${y}年${m}月`;
};
const payPeriodOf = (dateStr, payday) => {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  if (d >= payday) return `${y}-${String(m).padStart(2, "0")}`;
  let py = y, pm = m - 1;
  if (pm < 1) { pm = 12; py -= 1; }
  return `${py}-${String(pm).padStart(2, "0")}`;
};
const payPeriodLabel = (ym, payday) => {
  const [y, m] = ym.split("-").map(Number);
  let ny = y, nm = m + 1;
  if (nm > 12) { nm = 1; ny += 1; }
  if (payday <= 1) return `${y}年${m}月分`;
  return `${y}年${m}月分（${m}/${payday}〜${nm}/${payday - 1}）`;
};
const yen = (n) => `¥${Math.round(n).toLocaleString("ja-JP")}`;
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
const suggestPaymentDate = (purchaseDate, payDay) => {
  const [y, m] = (purchaseDate || todayStr()).split("-").map(Number);
  let ny = y, nm = m + 1;
  if (nm > 12) { nm = 1; ny += 1; }
  const day = Math.min(Number(payDay) || 27, daysInMonth(ny, nm));
  return `${ny}-${String(nm).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
};
const dateLabel = (dateStr) => {
  const [y, m, d] = dateStr.split("-").map(Number);
  const wd = ["日", "月", "火", "水", "木", "金", "土"][new Date(y, m - 1, d).getDay()];
  return `${m}/${d}(${wd})`;
};

const walletDeltaFor = (entry) => entry.method !== "cash" ? 0 : (entry.type === "income" ? entry.amount : -entry.amount);
const emoneyUseDeltaFor = (entry) => (entry.method === "emoney" && entry.type === "expense" && entry.potId) ? { potId: entry.potId, delta: -entry.amount } : null;
const emoneyChargeDeltaFor = (entry) => (entry.method === "credit" && entry.isCharge && entry.chargePotId) ? { potId: entry.chargePotId, delta: entry.amount } : null;

const applyWalletDelta = (wallet, delta, date, note) => {
  if (!delta) return wallet;
  const newBalance = (wallet.balance || 0) + delta;
  return { ...wallet, balance: newBalance, history: [...(wallet.history || []), { date, balance: newBalance, memo: note }] };
};
const applyEmoneyDelta = (list, deltaObj, date, note) => {
  if (!deltaObj) return list;
  return list.map(p => p.id === deltaObj.potId ? { ...p, balance: p.balance + deltaObj.delta, history: [...(p.history || []), { date, balance: p.balance + deltaObj.delta, memo: note }] } : p);
};
const applyBankDelta = (list, accountId, delta, date, note) => {
  if (!accountId || !delta) return list;
  return list.map(a => a.id === accountId ? { ...a, balance: (a.balance || 0) + delta, history: [...(a.history || []), { date, balance: (a.balance || 0) + delta, memo: note }] } : a);
};
const settleDueCredit = (txs, cards, banks, todayD) => {
  let nextBanks = banks;
  let touched = false;
  const nextTx = txs.map(t => {
    if (t.type === "expense" && t.method === "credit" && !t.settled && t.paymentDate && t.paymentDate <= todayD) {
      const card = cards.find(c => c.id === t.cardId);
      if (card && card.bankAccountId) {
        nextBanks = applyBankDelta(nextBanks, card.bankAccountId, -t.amount, todayD, `${t.cardName || card.name}引落：${t.category}`);
        touched = true;
        return { ...t, settled: true, settledAt: todayD, settledBankAccountId: card.bankAccountId, settledAmount: t.amount };
      }
    }
    return t;
  });
  return { tx: touched ? nextTx : txs, banks: touched ? nextBanks : banks, changed: touched };
};

/* メイン */
function Kakeibo() {
  const [loading, setLoading] = useState(true);
  const [transactions, setTransactions] = useState([]);
  const [savings, setSavings] = useState([]);
  const [bankAccounts, setBankAccounts] = useState([]);
  const [wallet, setWallet] = useState({ balance: 0, history: [] });
  const [emoneyAccounts, setEmoneyAccounts] = useState([]);
  const [transfers, setTransfers] = useState([]);
  const [creditCards, setCreditCards] = useState([]);
  const [payday, setPayday] = useState(25);
  const [activeTab, setActiveTab] = useState("record");
  const [toast, setToast] = useState(null);
  const [stamp, setStamp] = useState(null);
  const [editingId, setEditingId] = useState(null);

  useEffect(() => {
    (async () => {
      const [tx, sv, cc, ba, wl, tr, em, pd] = await Promise.all([
        loadKey("transactions", []), loadKey("savings-accounts", []), loadKey("credit-cards", []),
        loadKey("bank-accounts", []), loadKey("wallet-account", { balance: 0, history: [] }),
        loadKey("transfers", []), loadKey("emoney-accounts", []), loadKey("payday-setting", 25)
      ]);
      const { tx: settledTx, banks: settledBanks, changed } = settleDueCredit(tx, cc, ba, todayStr());
      setTransactions(settledTx); setSavings(sv); setCreditCards(cc);
      setBankAccounts(settledBanks); setWallet(wl); setTransfers(tr);
      setEmoneyAccounts(em); setPayday(pd); setLoading(false);
      if (changed) { saveKey("transactions", settledTx); saveKey("bank-accounts", settledBanks); }
    })();
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };
  const persist = (key, val, setter) => { setter(val); saveKey(key, val); };

  if (loading) return <Shell><div>帳簿を開いています…</div></Shell>;

  return (
    <Shell>
      <Header savings={savings} bankAccounts={bankAccounts} wallet={wallet} emoneyAccounts={emoneyAccounts} />
      <TabBar active={activeTab} onChange={setActiveTab} />
      {activeTab === "record" && <RecordTab editingId={editingId} transactions={transactions} creditCards={creditCards} bankAccounts={bankAccounts} onAddCard={(c) => persist("credit-cards", [...creditCards, c], setCreditCards)} onUpdateCard={(c) => persist("credit-cards", creditCards.map(x => x.id === c.id ? c : x), setCreditCards)} onDeleteCard={(id) => persist("credit-cards", creditCards.filter(x => x.id !== id), setCreditCards)} emoneyAccounts={emoneyAccounts} onAddEmoney={(p) => persist("emoney-accounts", [...emoneyAccounts, p], setEmoneyAccounts)} onDeleteEmoney={(id) => persist("emoney-accounts", emoneyAccounts.filter(x => x.id !== id), setEmoneyAccounts)} onCancelEdit={() => setEditingId(null)} onSubmit={(entry) => {
          let nextWallet = wallet, nextEmoney = emoneyAccounts, nextBank = bankAccounts;
          const oldEntry = entry.id ? transactions.find(t => t.id === entry.id) : null;
          if (oldEntry) {
            if (walletDeltaFor(oldEntry)) nextWallet = applyWalletDelta(nextWallet, -walletDeltaFor(oldEntry), todayStr(), "調整");
            if (emoneyUseDeltaFor(oldEntry)) nextEmoney = applyEmoneyDelta(nextEmoney, { potId: emoneyUseDeltaFor(oldEntry).potId, delta: -emoneyUseDeltaFor(oldEntry).delta }, todayStr(), "調整");
            if (oldEntry.settled) nextBank = applyBankDelta(nextBank, oldEntry.settledBankAccountId, oldEntry.settledAmount, todayStr(), "取消");
          }
          if (walletDeltaFor(entry)) nextWallet = applyWalletDelta(nextWallet, walletDeltaFor(entry), entry.date, entry.category);
          if (emoneyUseDeltaFor(entry)) nextEmoney = applyEmoneyDelta(nextEmoney, emoneyUseDeltaFor(entry), entry.date, "利用");
          persist("wallet-account", nextWallet, setWallet); persist("emoney-accounts", nextEmoney, setEmoneyAccounts);
          const nextTx = (entry.id ? transactions.map(t => t.id === entry.id ? entry : t) : [...transactions, { ...entry, id: uid() }]).sort((a,b) => b.date.localeCompare(a.date));
          const result = settleDueCredit(nextTx, creditCards, nextBank, todayStr());
          persist("transactions", result.tx, setTransactions); persist("bank-accounts", result.banks, setBankAccounts);
          showToast("記帳しました"); setEditingId(null);
      }} />}
      {activeTab === "list" && <ListTab transactions={transactions} onEdit={(id) => { setEditingId(id); setActiveTab("record"); }} onDelete={(id) => { const t = transactions.find(x => x.id === id); if(t) { if(t.settled) persist("bank-accounts", applyBankDelta(bankAccounts, t.settledBankAccountId, t.settledAmount, todayStr(), "削除"), setBankAccounts); } persist("transactions", transactions.filter(x => x.id !== id), setTransactions); showToast("削除しました"); }} />}
      {activeTab === "summary" && <SummaryTab transactions={transactions} creditCards={creditCards} payday={payday} onChangePayday={(p) => persist("payday-setting", p, setPayday)} />}
      {activeTab === "assets" && <AssetsTab savings={savings} onChangeSavings={(s) => persist("savings-accounts", s, setSavings)} bankAccounts={bankAccounts} onChangeBank={(b) => persist("bank-accounts", b, setBankAccounts)} wallet={wallet} onChangeWallet={(w) => persist("wallet-account", w, setWallet)} emoneyAccounts={emoneyAccounts} onChangeEmoney={(e) => persist("emoney-accounts", e, setEmoneyAccounts)} transfers={transfers} onChangeTransfers={(t) => persist("transfers", t, setTransfers)} onToast={showToast} />}
      {activeTab === "data" && <DataTab transactions={transactions} savings={savings} creditCards={creditCards} bankAccounts={bankAccounts} wallet={wallet} emoneyAccounts={emoneyAccounts} transfers={transfers} payday={payday} onImport={(tx, sv, cc, ba, wl, tr, em, pd) => { persist("transactions", tx, setTransactions); persist("savings-accounts", sv, setSavings); persist("credit-cards", cc, setCreditCards); persist("bank-accounts", ba, setBankAccounts); persist("wallet-account", wl, setWallet); persist("transfers", tr, setTransfers); persist("emoney-accounts", em, setEmoneyAccounts); persist("payday-setting", pd, setPayday); }} onToast={showToast} />}
      <GlobalStyle />
    </Shell>
  );
}

/* 簡略化したコンポーネント定義などは元の形式を維持 */
function Shell({children}) { return <div className="kb-shell"><div className="kb-book">{children}</div></div>; }
function Header({savings, bankAccounts, wallet, emoneyAccounts}) { 
  const total = savings.reduce((s,a) => s + Number(a.balance||0), 0) + bankAccounts.reduce((s,a) => s + Number(a.balance||0), 0) + (emoneyAccounts||[]).reduce((s,a) => s + Number(a.balance||0), 0) + Number(wallet?.balance||0);
  return <div className="kb-header"><div className="kb-title">家計簿</div><div className="kb-header-stat">資産合計<span>{yen(total)}</span></div></div>;
}
function TabBar({active, onChange}) { return <div className="kb-tabbar">{TABS.map(t => <button key={t.id} className={active===t.id?"kb-tab kb-tab-active":"kb-tab"} onClick={()=>onChange(t.id)}>{t.label}</button>)}</div>; }
function EmptyState({title, body}) { return <div className="kb-empty"><div>{title}</div><div>{body}</div></div>; }
function GlobalStyle() { return <style>{`/* CSSは適宜追加してください */`}</style>; }

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Kakeibo />);
</script>
</body>
</html>
