// 給料日基準の「支払い月」を計算する。例：給料日25日なら8/1〜8/24は前月分、8/25〜8/31は当月分。
const payPeriodOf = (dateStr, payday) => {
if (!dateStr) return "";
const [y, m, d] = dateStr.split("-").map(Number);
if (d >= payday) return `${y}-${String(m).padStart(2, "0")}`;
let py = y, pm = m - 1;
if (pm < 1) { pm = 12; py -= 1; }
return `${py}-${String(pm).padStart(2, "0")}`;
};
const payPeriodLabel = (ym, payday) => {
const [y, m] = ym.split("-").map(Number);
let ny = y, nm = m + 1;
if (nm > 12) { nm = 1; ny += 1; }
const endDay = payday - 1 <= 0 ? 1 : payday - 1;
if (payday <= 1) return `${y}年${m}月分`;
return `${y}年${m}月分（${m}/${payday}〜${nm}/${endDay}）`;
};
const yen = (n) => `¥${Math.round(n).toLocaleString("ja-JP")}`;
const daysInMonth = (y, m) => new Date(y, m, 0).getDate(); // m: 1-indexed month
// 購入日とカードの支払日(1〜31)から、翌月の支払日を提案する

const [y, m] = (purchaseDate || todayStr()).split("-").map(Number);
let ny = y, nm = m + 1;
if (nm > 12) { nm = 1; ny += 1; }
const day = Math.min(Number(payDay) || 27, daysInMonth(ny, nm));
return `${ny}-${String(nm).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
};
const dateLabel = (dateStr) => {

return `${m}/${d}(${wd})`;
};

const LS_PREFIX = "kakeibo:";
async function loadKey(key, fallback) {
try {
const raw = window.localStorage.getItem(LS_PREFIX + key);
if (raw === null || raw === undefined) return fallback;
return JSON.parse(raw);
} catch (e) {
return fallback;
}
}
async function saveKey(key, value) {
try {
window.localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
return true;
} catch (e) {
return false;
}
}

/* 取引が財布・電子マネー残高に与える影響を計算／適用するヘルパー */
function walletDeltaFor(entry) {
if (!entry || entry.method !== "cash") return 0;
return entry.type === "income" ? entry.amount : -entry.amount;
}
function emoneyUseDeltaFor(entry) {
if (entry && entry.method === "emoney" && entry.type === "expense" && entry.potId) {
return { potId: entry.potId, delta: -entry.amount };
}
return null;
}
function emoneyChargeDeltaFor(entry) {
if (entry && entry.method === "credit" && entry.isCharge && entry.chargePotId) {
return { potId: entry.chargePotId, delta: entry.amount };
}
return null;
}
function applyWalletDelta(wallet, delta, date, note) {
if (!delta) return wallet;
const newBalance = (wallet.balance || 0) + delta;
return {
...wallet,
balance: newBalance,
history: [...(wallet.history || []), { date, balance: newBalance, memo: note }],
};
}
function applyEmoneyDelta(list, deltaObj, date, note) {
if (!deltaObj) return list;
return list.map((p) =>
p.id === deltaObj.potId
? {
...p,
balance: p.balance + deltaObj.delta,
history: [...(p.history || []), { date, balance: p.balance + deltaObj.delta, memo: note }],
}
: p
);
}
function applyBankDelta(list, accountId, delta, date, note) {
if (!accountId || !delta) return list;
return list.map((a) =>
a.id === accountId
? {
...a,
balance: (a.balance || 0) + delta,
history: [...(a.history || []), { date, balance: (a.balance || 0) + delta, memo: note }],
}
: a
);
}
// 支払日を過ぎたクレジットカードの利用分を、連携した口座の残高から自動で引き落とす
function settleDueCredit(txs, cards, banks, todayD) {
let nextBanks = banks;
let touched = false;
const nextTx = txs.map((t) => {
if (
 t.type === "expense" && t.method === "credit" && !t.settled &&
 t.paymentDate && t.paymentDate <= todayD
) {
const card = cards.find((c) => c.id === t.cardId);
if (card && card.bankAccountId) {
nextBanks = applyBankDelta(
 nextBanks, card.bankAccountId, -t.amount, todayD,
 `${t.cardName || card.name}引き落とし：${t.category}`
);
touched = true;
return { ...t, settled: true, settledAt: todayD, settledBankAccountId: card.bankAccountId, settledAmount: t.amount };
}
}
return t;
});
return { tx: touched ? nextTx : txs, banks: touched ? nextBanks : banks, changed: touched };
}

function KakeiboInner() {
const [loading, setLoading] = useState(true);
const [loadError, setLoadError] = useState(null);

const [editingId, setEditingId] = useState(null);
const [reduceMotion, setReduceMotion] = useState(false);

}, []);

]);

const safeCc = Array.isArray(cc) ? cc : [];
const safeBa = Array.isArray(ba) ? ba : [];
const { tx: settledTx, banks: settledBanks, changed } = settleDueCredit(safeTx, safeCc, safeBa, todayStr());
setTransactions(settledTx);
setSavings(Array.isArray(sv) ? sv : []);
setCreditCards(safeCc);
setBankAccounts(settledBanks);
setWallet(wl && typeof wl === "object" ? wl : { balance: 0, history: [] });
setTransfers(Array.isArray(tr) ? tr : []);
setEmoneyAccounts(Array.isArray(em) ? em : []);
setPayday(Number.isFinite(Number(pd)) && pd ? Number(pd) : 25);
if (changed) {
saveKey("transactions", settledTx);
saveKey("bank-accounts", settledBanks);
}
} catch (e) {
setLoadError(String((e && e.message) || e));
} finally {
setLoading(false);
}
})();
}, []);

}, []);

const ok = await saveKey("savings-accounts", next);

}, [showToast]);

const persistCreditCards = useCallback(async (next) => {
setCreditCards(next);
const ok = await saveKey("credit-cards", next);

}, [showToast]);

const persistBankAccounts = useCallback(async (next) => {

const ok = await saveKey("bank-accounts", next);

}, [showToast]);

const ok = await saveKey("wallet-account", next);

}, [showToast]);

const persistEmoney = useCallback(async (next) => {
setEmoneyAccounts(next);
const ok = await saveKey("emoney-accounts", next);
if (!ok) showToast("保存に失敗しました。もう一度お試しください");
}, [showToast]);

const persistTransfers = useCallback(async (next) => {
setTransfers(next);
const ok = await saveKey("transfers", next);
if (!ok) showToast("保存に失敗しました。もう一度お試しください");

const addOrUpdateTransaction = useCallback((entry) => {

let next;
if (entry.id) {
next = prev.map((t) => (t.id === entry.id ? entry : t));
} else {
next = [...prev, { ...entry, id: uid() }];
}
next.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
saveKey("transactions", next);
return next;
});
}, []);

const deleteTransaction = useCallback((id) => {
setTransactions((prev) => {
const next = prev.filter((t) => t.id !== id);
saveKey("transactions", next);
return next;
});
}, []);

const triggerStamp = (kind) => {

setTimeout(() => setStamp(null), 950);

return (
<Shell>
<Header savings={savings} bankAccounts={bankAccounts} wallet={wallet} emoneyAccounts={emoneyAccounts} />
<TabBar active={activeTab} onChange={setActiveTab} />
<div style={{ position: "relative" }}>
{activeTab === "record" && (
<RecordTab
editingId={editingId}
transactions={transactions}
creditCards={creditCards}
bankAccounts={bankAccounts}
onAddCard={(card) => {
persistCreditCards([...creditCards, card]);
showToast("カードを追加しました");
}}
onUpdateCard={(card) => {

showToast("カードの設定を更新しました");
}}
onDeleteCard={(id) => {
persistCreditCards(creditCards.filter((c) => c.id !== id));
showToast("カードを削除しました");
}}
emoneyAccounts={emoneyAccounts}
onAddEmoney={(pot) => {
persistEmoney([...emoneyAccounts, pot]);
showToast("電子マネーを追加しました");
}}
onDeleteEmoney={(id) => {
persistEmoney(emoneyAccounts.filter((p) => p.id !== id));
showToast("電子マネーを削除しました");
}}
onCancelEdit={() => setEditingId(null)}
onSubmit={(entry) => {
const oldEntry = entry.id ? transactions.find((t) => t.id === entry.id) : null;
let nextWallet = wallet;
let nextEmoney = emoneyAccounts;
let nextBank = bankAccounts;

```
          if (oldEntry) {
            const oldWalletDelta = walletDeltaFor(oldEntry);
            if (oldWalletDelta) nextWallet = applyWalletDelta(nextWallet, -oldWalletDelta, todayStr(), "記録の編集による調整");
            const oldUse = emoneyUseDeltaFor(oldEntry);
            if (oldUse) nextEmoney = applyEmoneyDelta(nextEmoney, { potId: oldUse.potId, delta: -oldUse.delta }, todayStr(), "記録の編集による調整");
            const oldCharge = emoneyChargeDeltaFor(oldEntry);
            if (oldCharge) nextEmoney = applyEmoneyDelta(nextEmoney, { potId: oldCharge.potId, delta: -oldCharge.delta }, todayStr(), "記録の編集による調整");
            if (oldEntry.settled && oldEntry.settledBankAccountId) {
              nextBank = applyBankDelta(
                nextBank, oldEntry.settledBankAccountId, oldEntry.settledAmount || oldEntry.amount,
                todayStr(), "記録の編集による引き落とし取り消し"
              );
            }
          }

          const newWalletDelta = walletDeltaFor(entry);
          if (newWalletDelta) {
            nextWallet = applyWalletDelta(nextWallet, newWalletDelta, entry.date, `${entry.type === "income" ? "収入" : "支出"}: ${entry.category}`);
          }
          const newUse = emoneyUseDeltaFor(entry);
          if (newUse) nextEmoney = applyEmoneyDelta(nextEmoney, newUse, entry.date, `利用: ${entry.category}`);
          const newCharge = emoneyChargeDeltaFor(entry);
          if (newCharge) nextEmoney = applyEmoneyDelta(nextEmoney, newCharge, entry.date, "クレジットカードからチャージ");

          if (nextWallet !== wallet) persistWallet(nextWallet);
          if (nextEmoney !== emoneyAccounts) persistEmoney(nextEmoney);

          const clearedEntry = { ...entry, settled: false, settledAt: null, settledBankAccountId: null, settledAmount: null };
          const nextTxArray = clearedEntry.id
            ? transactions.map((t) => (t.id === clearedEntry.id ? clearedEntry : t))
            : [...transactions, { ...clearedEntry, id: uid() }];
          nextTxArray.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
          const settleResult = settleDueCredit(nextTxArray, creditCards, nextBank, todayStr());

          setTransactions(settleResult.tx);
          saveKey("transactions", settleResult.tx);
          if (settleResult.changed) {
            persistBankAccounts(settleResult.banks);
          } else if (nextBank !== bankAccounts) {
            persistBankAccounts(nextBank);
          }

          triggerStamp(entry.type);
          showToast(entry.id ? "記録を更新しました" : "記帳しました");
          setEditingId(null);
        }}
      />
    )}
    {activeTab === "list" && (
      <ListTab
        transactions={transactions}
        onEdit={(id) => {
          setEditingId(id);
          setActiveTab("record");
        }}
        onDelete={(id) => {
          const t = transactions.find((x) => x.id === id);
          if (t) {
            let nextWallet = wallet;
            let nextEmoney = emoneyAccounts;
            let nextBank = bankAccounts;
            const wd = walletDeltaFor(t);
            if (wd) nextWallet = applyWalletDelta(nextWallet, -wd, todayStr(), "記録の削除による調整");
            const ud = emoneyUseDeltaFor(t);
            if (ud) nextEmoney = applyEmoneyDelta(nextEmoney, { potId: ud.potId, delta: -ud.delta }, todayStr(), "記録の削除による調整");
            const cd = emoneyChargeDeltaFor(t);
            if (cd) nextEmoney = applyEmoneyDelta(nextEmoney, { potId: cd.potId, delta: -cd.delta }, todayStr(), "記録の削除による調整");
            if (t.settled && t.settledBankAccountId) {
              nextBank = applyBankDelta(
                nextBank, t.settledBankAccountId, t.settledAmount || t.amount,
                todayStr(), "記録の削除による引き落とし取り消し"
              );
            }
            if (nextWallet !== wallet) persistWallet(nextWallet);
            if (nextEmoney !== emoneyAccounts) persistEmoney(nextEmoney);
            if (nextBank !== bankAccounts) persistBankAccounts(nextBank);
          }
          deleteTransaction(id);
          showToast("削除しました");
        }}
      />
    )}
    {activeTab === "summary" && (
      <SummaryTab
        transactions={transactions}
        creditCards={creditCards}
        payday={payday}
        onChangePayday={persistPayday}
      />
    )}
    {activeTab === "assets" && (
      <AssetsTab
        savings={savings}
        onChangeSavings={persistSavings}
        bankAccounts={bankAccounts}
        onChangeBank={persistBankAccounts}
        wallet={wallet}
        onChangeWallet={persistWallet}
        emoneyAccounts={emoneyAccounts}
        onChangeEmoney={persistEmoney}
        transfers={transfers}
        onChangeTransfers={persistTransfers}
        onToast={showToast}
      />
    )}
    {activeTab === "data" && (
      <DataTab
        transactions={transactions}
        savings={savings}
        creditCards={creditCards}
        bankAccounts={bankAccounts}
        wallet={wallet}
        emoneyAccounts={emoneyAccounts}
        transfers={transfers}
        payday={payday}
        onImport={(tx, sv, cc, ba, wl, tr, em, pd) => {
          persistTransactions(tx);
          persistSavings(sv);
          persistCreditCards(cc);
          persistBankAccounts(ba);
          persistWallet(wl);
          persistTransfers(tr);
          persistEmoney(em);
          persistPayday(pd);
          showToast("データを読み込みました");
        }}
        onToast={showToast}
      />
    )}
    <StampOverlay stamp={stamp} />
  </div>
  {toast && <Toast text={toast} />}
  <GlobalStyle />
</Shell>

);
}

class ErrorBoundary extends React.Component {
constructor(props) {
super(props);
this.state = { error: null };
}
static getDerivedStateFromError(error) {
return { error };
}
render() {
if (this.state.error) {
return (
<div style={{
minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
background: "#D3BD8C", fontFamily: "'Zen Kaku Gothic New', sans-serif", padding: 24,
}}>
<div style={{ maxWidth: 420, textAlign: "center", color: "#A63D2F" }}>
<div style={{ fontWeight: 700, marginBottom: 10, fontSize: 15 }}>画面の表示中にエラーが発生しました</div>
<div style={{ fontSize: 12, color: "#6B5F4D", wordBreak: "break-all", marginBottom: 16 }}>
{String((this.state.error && this.state.error.message) || this.state.error)}
</div>
<button
onClick={() => window.location.reload()}
style={{
border: "none", background: "#2B2620", color: "#EBDFB9", padding: "10px 20px",
borderRadius: 8, fontWeight: 700, cursor: "pointer",
}}
>
再読み込み
</button>
</div>
</div>
);
}
return this.props.children;
}
}

function RecordTab({ onSubmit, editingId, transactions, onCancelEdit, creditCards, onAddCard, onUpdateCard, onDeleteCard, bankAccounts, emoneyAccounts, onAddEmoney, onDeleteEmoney }) {
const editing = editingId ? transactions.find((t) => t.id === editingId) : null;

const blank = {
type: "expense",
method: "cash",
amount: "",
category: EXPENSE_CATEGORIES[0],
date: todayStr(),
cardId: "",
paymentDate: "",
isCharge: false,
chargePotId: "",
potId: "",
memo: "",
};
const [form, setForm] = useState(editing || blank);
const [paymentDateTouched, setPaymentDateTouched] = useState(false);
const [showCardForm, setShowCardForm] = useState(false);
const [cardName, setCardName] = useState("");
const [cardPayDay, setCardPayDay] = useState("27");
const [cardBankAccountId, setCardBankAccountId] = useState("");
const [showEmoneyForm, setShowEmoneyForm] = useState(false);
const [emoneyName, setEmoneyName] = useState("");

useEffect(() => {
if (editing) {
setForm({ ...editing, amount: String(editing.amount) });
setPaymentDateTouched(true);
} else {
setForm(blank);
setPaymentDateTouched(false);
}
// eslint-disable-next-line react-hooks/exhaustive-deps
}, [editingId]);

// カードまたは購入日が変わったら、支払日をカード設定から自動提案する（手動編集後は上書きしない）
useEffect(() => {
if (form.method !== "credit") return;
if (paymentDateTouched) return;
const card = creditCards.find((c) => c.id === form.cardId);
if (!card) return;
setForm((f) => ({ ...f, paymentDate: suggestPaymentDate(f.date, card.payDay) }));
// eslint-disable-next-line react-hooks/exhaustive-deps
}, [form.method, form.cardId, form.date, creditCards]);

useEffect(() => {
if (form.method === "credit" && !form.cardId && creditCards.length > 0) {
setForm((f) => ({ ...f, cardId: creditCards[0].id }));
}
}, [form.method, form.cardId, creditCards]);

useEffect(() => {
if (form.method === "emoney" && !form.potId && emoneyAccounts.length > 0) {
setForm((f) => ({ ...f, potId: emoneyAccounts[0].id }));
}
}, [form.method, form.potId, emoneyAccounts]);

const methods = form.type === "income" ? INCOME_METHODS : EXPENSE_METHODS;
const categories = form.type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
const accent = form.type === "income" ? COLORS.income : COLORS.expense;

const setType = (type) => {
const methods2 = type === "income" ? INCOME_METHODS : EXPENSE_METHODS;
const categories2 = type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
setForm((f) => ({
...f,
type,
method: methods2[0].id,
category: categories2[0],
}));
};

const setMethod = (method) => {
setPaymentDateTouched(false);
setForm((f) => ({ ...f, method, isCharge: false }));
};
const setDate = (date) => setForm((f) => ({ ...f, date }));

const addCard = () => {
if (!cardName.trim()) return;
const card = {
id: uid(),
name: cardName.trim(),
payDay: Math.min(31, Math.max(1, Number(cardPayDay) || 27)),
bankAccountId: cardBankAccountId || "",
};
onAddCard(card);
setForm((f) => ({ ...f, cardId: card.id }));
setPaymentDateTouched(false);
setCardName("");
setCardPayDay("27");
setCardBankAccountId("");
setShowCardForm(false);
};

const addEmoneyPot = (thenAssignTo) => {
if (!emoneyName.trim()) return;
const pot = { id: uid(), name: emoneyName.trim(), balance: 0, history: [] };
onAddEmoney(pot);
if (thenAssignTo === "potId") setForm((f) => ({ ...f, potId: pot.id }));
if (thenAssignTo === "chargePotId") setForm((f) => ({ ...f, chargePotId: pot.id }));
setEmoneyName("");
setShowEmoneyForm(false);
};

const selectedCard = creditCards.find((c) => c.id === form.cardId);
const selectedPot = emoneyAccounts.find((p) => p.id === form.potId);
const selectedChargePot = emoneyAccounts.find((p) => p.id === form.chargePotId);
const canSubmit =
form.amount && Number(form.amount) > 0 && form.date &&
(form.method !== "credit" || (form.cardId && form.paymentDate)) &&
(form.method !== "credit" || !form.isCharge || form.chargePotId) &&
(form.method !== "emoney" || form.potId);

const submit = () => {
if (!canSubmit) return;
const entry = {
id: editing ? editing.id : null,
type: form.type,
method: form.method,
amount: Number(form.amount),
category: form.category,
date: form.date,
memo: form.memo.trim(),
cardId: form.method === "credit" ? form.cardId : null,
cardName: form.method === "credit" ? (selectedCard ? selectedCard.name : "") : null,
paymentDate: form.method === "credit" ? form.paymentDate : null,
billingMonth: form.method === "credit" ? monthOf(form.paymentDate) : null,
isCharge: form.method === "credit" ? !!form.isCharge : false,
chargePotId: form.method === "credit" && form.isCharge ? form.chargePotId : null,
chargePotName: form.method === "credit" && form.isCharge ? (selectedChargePot ? selectedChargePot.name : "") : null,
potId: form.method === "emoney" ? form.potId : null,
potName: form.method === "emoney" ? (selectedPot ? selectedPot.name : "") : null,
};
onSubmit(entry);
if (!editing) {
setForm(blank);
setPaymentDateTouched(false);
}
};

return (
<div className="kb-panel">
{editing && (
<div className="kb-editbar">
<span>この記録を編集中</span>
<button className="kb-linkbtn" onClick={onCancelEdit}>
新規記帳に戻る
</button>
</div>
)}
