const { useState, useEffect, useMemo, useCallback } = React;

/* —————————————————————— */
/* 定数                                                                */
/* —————————————————————— */

const INCOME_CATEGORIES = [“給与”, “副業”, “お小遣い”, “臨時収入”, “ハピカ売上”, “その他収入”];
const EXPENSE_CATEGORIES = [
“食費”, “日用品”, “交通”, “交際費”, “趣味・娯楽”,
“住居”, “光熱費”, “通信費”, “医療”, “現場”, “その他支出”,
];
const INCOME_METHODS = [
{ id: “cash”, label: “現金” },
{ id: “paypay”, label: “PayPay” },
{ id: “bank”, label: “銀行振込” },
];
const EXPENSE_METHODS = [
{ id: “cash”, label: “現金” },
{ id: “paypay”, label: “PayPay” },
{ id: “credit”, label: “クレジットカード” },
];
const METHOD_LABEL = {
cash: “現金”, paypay: “PayPay”, bank: “銀行振込”, credit: “クレカ”,
};

const TABS = [
{ id: “record”, label: “記帳”, sub: “RECORD” },
{ id: “list”, label: “一覧”, sub: “LIST” },
{ id: “summary”, label: “集計”, sub: “SUMMARY” },
{ id: “assets”, label: “資産”, sub: “ASSETS” },
{ id: “data”, label: “データ”, sub: “BACKUP” },
];

const COLORS = {
paper: “#EBDFB9”,
paperDark: “#DECBA0”,
paperDeep: “#D3BD8C”,
ink: “#2B2620”,
inkLight: “#6B5F4D”,
inkFaint: “#948868”,
income: “#3D6B4F”,
expense: “#A63D2F”,
credit: “#48577A”,
savings: “#8B6F3E”,
bank: “#3E6E71”,
wallet: “#8B5E34”,
seal: “#B7410E”,
};

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const todayStr = () => {
const d = new Date();
return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const thisMonthStr = () => todayStr().slice(0, 7);
const monthOf = (dateStr) => (dateStr || “”).slice(0, 7);
const nextMonthOf = (dateStr) => {
const [y, m] = (dateStr || todayStr()).split(”-”).map(Number);
const d = new Date(y, m, 1); // m is 0-indexed already => next month
return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};
const shiftMonth = (ym, delta) => {
const [y, m] = ym.split(”-”).map(Number);
const d = new Date(y, m - 1 + delta, 1);
return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};
const monthLabel = (ym) => {
const [y, m] = ym.split(”-”).map(Number);
return `${y}年${m}月`;
};
const yen = (n) => `¥${Math.round(n).toLocaleString("ja-JP")}`;
const daysInMonth = (y, m) => new Date(y, m, 0).getDate(); // m: 1-indexed month
// 購入日とカードの支払日(1〜31)から、翌月の支払日を提案する
const suggestPaymentDate = (purchaseDate, payDay) => {
const [y, m] = (purchaseDate || todayStr()).split(”-”).map(Number);
let ny = y, nm = m + 1;
if (nm > 12) { nm = 1; ny += 1; }
const day = Math.min(Number(payDay) || 27, daysInMonth(ny, nm));
return `${ny}-${String(nm).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
};
const dateLabel = (dateStr) => {
const [y, m, d] = dateStr.split(”-”).map(Number);
const wd = [“日”, “月”, “火”, “水”, “木”, “金”, “土”][new Date(y, m - 1, d).getDay()];
return `${m}/${d}(${wd})`;
};

/* —————————————————————— */
/* ストレージ                                                          */
/* —————————————————————— */

const LS_PREFIX = “kakeibo:”;
async function loadKey(key, fallback) {
try {
const raw = window.localStorage.getItem(LS_PREFIX + key);
if (raw === null || raw === undefined) return fallback;
return JSON.parse(raw);
} catch (e) {
return fallback;
}
}
async function saveKey(key, value) {
try {
window.localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
return true;
} catch (e) {
return false;
}
}

/* —————————————————————— */
/* メインコンポーネント                                                 */
/* —————————————————————— */

function Kakeibo() {
const [loading, setLoading] = useState(true);
const [transactions, setTransactions] = useState([]);
const [savings, setSavings] = useState([]);
const [bankAccounts, setBankAccounts] = useState([]);
const [wallet, setWallet] = useState({ balance: 0, history: [] });
const [transfers, setTransfers] = useState([]);
const [creditCards, setCreditCards] = useState([]);
const [activeTab, setActiveTab] = useState(“record”);
const [toast, setToast] = useState(null);
const [stamp, setStamp] = useState(null); // {kind:‘income’|‘expense’}
const [editingId, setEditingId] = useState(null);
const [reduceMotion, setReduceMotion] = useState(false);

useEffect(() => {
const mq = window.matchMedia(”(prefers-reduced-motion: reduce)”);
setReduceMotion(mq.matches);
}, []);

useEffect(() => {
const link = document.createElement(“link”);
link.rel = “stylesheet”;
link.href =
“https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap”;
document.head.appendChild(link);
return () => document.head.removeChild(link);
}, []);

useEffect(() => {
(async () => {
const [tx, sv, cc, ba, wl, tr] = await Promise.all([
loadKey(“transactions”, []),
loadKey(“savings-accounts”, []),
loadKey(“credit-cards”, []),
loadKey(“bank-accounts”, []),
loadKey(“wallet-account”, { balance: 0, history: [] }),
loadKey(“transfers”, []),
]);
setTransactions(tx);
setSavings(sv);
setCreditCards(cc);
setBankAccounts(ba);
setWallet(wl);
setTransfers(tr);
setLoading(false);
})();
}, []);

const showToast = useCallback((msg) => {
setToast(msg);
setTimeout(() => setToast(null), 2200);
}, []);

const persistTransactions = useCallback(async (next) => {
setTransactions(next);
const ok = await saveKey(“transactions”, next);
if (!ok) showToast(“保存に失敗しました。もう一度お試しください”);
}, [showToast]);

const persistSavings = useCallback(async (next) => {
setSavings(next);
const ok = await saveKey(“savings-accounts”, next);
if (!ok) showToast(“保存に失敗しました。もう一度お試しください”);
}, [showToast]);

const persistCreditCards = useCallback(async (next) => {
setCreditCards(next);
const ok = await saveKey(“credit-cards”, next);
if (!ok) showToast(“保存に失敗しました。もう一度お試しください”);
}, [showToast]);

const persistBankAccounts = useCallback(async (next) => {
setBankAccounts(next);
const ok = await saveKey(“bank-accounts”, next);
if (!ok) showToast(“保存に失敗しました。もう一度お試しください”);
}, [showToast]);

const persistWallet = useCallback(async (next) => {
setWallet(next);
const ok = await saveKey(“wallet-account”, next);
if (!ok) showToast(“保存に失敗しました。もう一度お試しください”);
}, [showToast]);

const persistTransfers = useCallback(async (next) => {
setTransfers(next);
const ok = await saveKey(“transfers”, next);
if (!ok) showToast(“保存に失敗しました。もう一度お試しください”);
}, [showToast]);

const addOrUpdateTransaction = useCallback((entry) => {
setTransactions((prev) => {
let next;
if (entry.id) {
next = prev.map((t) => (t.id === entry.id ? entry : t));
} else {
next = […prev, { …entry, id: uid() }];
}
next.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
saveKey(“transactions”, next);
return next;
});
}, []);

const deleteTransaction = useCallback((id) => {
setTransactions((prev) => {
const next = prev.filter((t) => t.id !== id);
saveKey(“transactions”, next);
return next;
});
}, []);

const triggerStamp = (kind) => {
if (reduceMotion) return;
setStamp({ kind, key: uid() });
setTimeout(() => setStamp(null), 950);
};

if (loading) {
return (
<Shell>
<div style={{ padding: 60, textAlign: “center”, color: COLORS.inkLight, fontFamily: “‘Zen Kaku Gothic New’, sans-serif” }}>
帳簿を開いています…
</div>
</Shell>
);
}

return (
<Shell>
<Header savings={savings} bankAccounts={bankAccounts} wallet={wallet} />
<TabBar active={activeTab} onChange={setActiveTab} />
<div style={{ position: “relative” }}>
{activeTab === “record” && (
<RecordTab
editingId={editingId}
transactions={transactions}
creditCards={creditCards}
onAddCard={(card) => {
persistCreditCards([…creditCards, card]);
showToast(“カードを追加しました”);
}}
onDeleteCard={(id) => {
persistCreditCards(creditCards.filter((c) => c.id !== id));
showToast(“カードを削除しました”);
}}
onCancelEdit={() => setEditingId(null)}
onSubmit={(entry) => {
addOrUpdateTransaction(entry);
triggerStamp(entry.type);
showToast(entry.id ? “記録を更新しました” : “記帳しました”);
setEditingId(null);
}}
/>
)}
{activeTab === “list” && (
<ListTab
transactions={transactions}
onEdit={(id) => {
setEditingId(id);
setActiveTab(“record”);
}}
onDelete={(id) => {
deleteTransaction(id);
showToast(“削除しました”);
}}
/>
)}
{activeTab === “summary” && (
<SummaryTab transactions={transactions} creditCards={creditCards} />
)}
{activeTab === “assets” && (
<AssetsTab
savings={savings}
onChangeSavings={persistSavings}
bankAccounts={bankAccounts}
onChangeBank={persistBankAccounts}
wallet={wallet}
onChangeWallet={persistWallet}
transfers={transfers}
onChangeTransfers={persistTransfers}
onToast={showToast}
/>
)}
{activeTab === “data” && (
<DataTab
transactions={transactions}
savings={savings}
creditCards={creditCards}
bankAccounts={bankAccounts}
wallet={wallet}
transfers={transfers}
onImport={(tx, sv, cc, ba, wl, tr) => {
persistTransactions(tx);
persistSavings(sv);
persistCreditCards(cc);
persistBankAccounts(ba);
persistWallet(wl);
persistTransfers(tr);
showToast(“データを読み込みました”);
}}
onToast={showToast}
/>
)}
<StampOverlay stamp={stamp} />
</div>
{toast && <Toast text={toast} />}
<GlobalStyle />
</Shell>
);
}

/* —————————————————————— */
/* レイアウト部品                                                       */

function Shell({ children }) {
return (
<div className="kb-shell">
<div className="kb-book">{children}</div>
</div>
);
}

function Header({ savings, bankAccounts, wallet }) {
const total =
savings.reduce((s, a) => s + Number(a.balance || 0), 0) +
bankAccounts.reduce((s, a) => s + Number(a.balance || 0), 0) +
Number(wallet?.balance || 0);
return (
<div className="kb-header">
<div className="kb-header-left">
<div className="kb-eyebrow">大福帳 · KAKEIBO LEDGER</div>
<div className="kb-title">家計簿</div>
</div>
<div className="kb-header-right">
<div className="kb-header-stat">
<span className="kb-header-stat-label">資産合計</span>
<span className="kb-header-stat-value">{yen(total)}</span>
</div>
</div>
</div>
);
}

function TabBar({ active, onChange }) {
return (
<div className="kb-tabbar" role="tablist" aria-label="セクション切り替え">
{TABS.map((t) => (
<button
key={t.id}
role=“tab”
aria-selected={active === t.id}
className={`kb-tab ${active === t.id ? "kb-tab-active" : ""}`}
onClick={() => onChange(t.id)}
>
<span className="kb-tab-sub">{t.sub}</span>
<span className="kb-tab-label">{t.label}</span>
</button>
))}
</div>
);
}

function Toast({ text }) {
return <div className="kb-toast">{text}</div>;
}

function StampOverlay({ stamp }) {
if (!stamp) return null;
const isIncome = stamp.kind === “income”;
return (
<div className="kb-stamp-layer" key={stamp.key} aria-hidden="true">
<div className={`kb-stamp ${isIncome ? "kb-stamp-income" : "kb-stamp-expense"}`}>
<span>{isIncome ? “入金” : “支払”}</span>
<span className="kb-stamp-sub">済</span>
</div>
</div>
);
}

/* —————————————————————— */
/* 記帳タブ                                                             */
/* —————————————————————— */

function RecordTab({ onSubmit, editingId, transactions, onCancelEdit, creditCards, onAddCard, onDeleteCard }) {
const editing = editingId ? transactions.find((t) => t.id === editingId) : null;

const blank = {
type: “expense”,
method: “cash”,
amount: “”,
category: EXPENSE_CATEGORIES[0],
date: todayStr(),
cardId: “”,
paymentDate: “”,
memo: “”,
};
const [form, setForm] = useState(editing || blank);
const [paymentDateTouched, setPaymentDateTouched] = useState(false);
const [showCardForm, setShowCardForm] = useState(false);
const [cardName, setCardName] = useState(””);
const [cardPayDay, setCardPayDay] = useState(“27”);

useEffect(() => {
if (editing) {
setForm({ …editing, amount: String(editing.amount) });
setPaymentDateTouched(true);
} else {
setForm(blank);
setPaymentDateTouched(false);
}
// eslint-disable-next-line react-hooks/exhaustive-deps
}, [editingId]);

// カードまたは購入日が変わったら、支払日をカード設定から自動提案する（手動編集後は上書きしない）
useEffect(() => {
if (form.method !== “credit”) return;
if (paymentDateTouched) return;
const card = creditCards.find((c) => c.id === form.cardId);
if (!card) return;
setForm((f) => ({ …f, paymentDate: suggestPaymentDate(f.date, card.payDay) }));
// eslint-disable-next-line react-hooks/exhaustive-deps
}, [form.method, form.cardId, form.date, creditCards]);

useEffect(() => {
if (form.method === “credit” && !form.cardId && creditCards.length > 0) {
setForm((f) => ({ …f, cardId: creditCards[0].id }));
}
}, [form.method, form.cardId, creditCards]);

const methods = form.type === “income” ? INCOME_METHODS : EXPENSE_METHODS;
const categories = form.type === “income” ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
const accent = form.type === “income” ? COLORS.income : COLORS.expense;

const setType = (type) => {
const methods2 = type === “income” ? INCOME_METHODS : EXPENSE_METHODS;
const categories2 = type === “income” ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
setForm((f) => ({
…f,
type,
method: methods2[0].id,
category: categories2[0],
}));
};

const setMethod = (method) => {
setPaymentDateTouched(false);
setForm((f) => ({ …f, method }));
};
const setDate = (date) => setForm((f) => ({ …f, date }));

const addCard = () => {
if (!cardName.trim()) return;
const card = { id: uid(), name: cardName.trim(), payDay: Math.min(31, Math.max(1, Number(cardPayDay) || 27)) };
onAddCard(card);
setForm((f) => ({ …f, cardId: card.id }));
setPaymentDateTouched(false);
setCardName(””);
setCardPayDay(“27”);
setShowCardForm(false);
};

const selectedCard = creditCards.find((c) => c.id === form.cardId);
const canSubmit =
form.amount && Number(form.amount) > 0 && form.date &&
(form.method !== “credit” || (form.cardId && form.paymentDate));

const submit = () => {
if (!canSubmit) return;
const entry = {
id: editing ? editing.id : null,
type: form.type,
method: form.method,
amount: Number(form.amount),
category: form.category,
date: form.date,
memo: form.memo.trim(),
cardId: form.method === “credit” ? form.cardId : null,
cardName: form.method === “credit” ? (selectedCard ? selectedCard.name : “”) : null,
paymentDate: form.method === “credit” ? form.paymentDate : null,
billingMonth: form.method === “credit” ? monthOf(form.paymentDate) : null,
};
onSubmit(entry);
if (!editing) {
setForm(blank);
setPaymentDateTouched(false);
}
};

return (
<div className="kb-panel">
{editing && (
<div className="kb-editbar">
<span>この記録を編集中</span>
<button className="kb-linkbtn" onClick={onCancelEdit}>
新規記帳に戻る
</button>
</div>
)}

```
  <div className="kb-segment">

                if (window.confirm(`「${selectedCard ? selectedCard.name : ""}」を削除しますか？過去の記録のカード名は残ります。`)) {
                  onDeleteCard(form.cardId);

                }
              }}
            >
              このカードを削除
            </button>
          )}
        </div>
      )}
    </div>
  )}

  <label className="kb-field">
    <span className="kb-field-label">カテゴリ</span>
    <select
      className="kb-input"
      value={form.category}
      onChange={(e) => setForm((f) => ({ ...f, category: e.target.value }))}
    >
      {categories.map((c) => (

      ))}

    <span className="kb-field-label">日付</span>
    <input
      type="date"
      className="kb-input"
      value={form.date}
      onChange={(e) => setDate(e.target.value)}

function SummaryTab({ transactions, creditCards }) {
const [month, setMonth] = useState(thisMonthStr());

const stats = useMemo(() => {
let cashIncome = 0, cashExpense = 0, creditUsedThisMonth = 0, creditDueThisMonth = 0;
const byCategory = {};
const byCard = {}; // cardId -> { name, used, due }
const touchCard = (t, field) => {
const key = t.cardId || t.cardName || “unknown”;
if (!byCard[key]) byCard[key] = { name: t.cardName || “（削除済みのカード）”, used: 0, due: 0 };
byCard[key][field] += t.amount;
};
for (const t of transactions) {
const isThisMonth = monthOf(t.date) === month;
if (t.type === “income” && isThisMonth) cashIncome += t.amount;
if (t.type === “expense” && isThisMonth && (t.method === “cash” || t.method === “paypay”)) {
cashExpense += t.amount;
}
if (t.type === “expense” && t.method === “credit” && isThisMonth) {
creditUsedThisMonth += t.amount;
touchCard(t, “used”);
}
if (t.type === “expense” && t.method === “credit” && t.billingMonth === month) {
creditDueThisMonth += t.amount;
touchCard(t, “due”);
}
if (t.type === “expense” && isThisMonth) {
byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
}
}
const netCashFlow = cashIncome - cashExpense - creditDueThisMonth;
return {
cashIncome, cashExpense, creditUsedThisMonth, creditDueThisMonth, netCashFlow,
byCategory, byCard: Object.values(byCard),
};
}, [transactions, month]);

const catEntries = Object.entries(stats.byCategory).sort((a, b) => b[1] - a[1]);
const maxCat = catEntries.length ? catEntries[0][1] : 0;

return (

function DataTab({ transactions, savings, creditCards, bankAccounts, wallet, transfers, onImport, onToast }) {
const [importText, setImportText] = useState(””);
const fileRef = React.useRef(null);

const exportData = () => {
const payload = {
app: “kakeibo-ledger”,
version: 3,
exportedAt: new Date().toISOString(),
transactions,
savings,
creditCards,
bankAccounts,
wallet,
transfers,
};
const blob = new Blob([JSON.stringify(payload, null, 2)], { type: “application/json” });
const url = URL.createObjectURL(blob);
const a = document.createElement(“a”);
a.href = url;
a.download = `kakeibo-backup-${todayStr()}.json`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
onToast(“バックアップを書き出しました”);
};

const applyImport = (text) => {
try {
const data = JSON.parse(text);
const tx = Array.isArray(data.transactions) ? data.transactions : [];
const sv = Array.isArray(data.savings) ? data.savings : [];
const cc = Array.isArray(data.creditCards) ? data.creditCards : [];
const ba = Array.isArray(data.bankAccounts) ? data.bankAccounts : [];
const wl = data.wallet && typeof data.wallet === “object” ? data.wallet : { balance: 0, history: [] };
const tr = Array.isArray(data.transfers) ? data.transfers : [];
if (!window.confirm(`取引 ${tx.length} 件・口座 ${ba.length} 件・貯金口座 ${sv.length} 件・カード ${cc.length} 件を読み込みます。現在のデータは上書きされます。よろしいですか？`)) {
return;
}
onImport(tx, sv, cc, ba, wl, tr);
setImportText(””);
} catch (e) {
onToast(“読み込みに失敗しました。ファイルの内容を確認してください”);
}
};

const handleFile = (e) => {
const file = e.target.files && e.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = () => applyImport(String(reader.result || “”));
reader.readAsText(file);
e.target.value = “”;
};

return (
<div className="kb-panel">
<div className="kb-subhead">バックアップを書き出す</div>
<p className="kb-para">
すべての記録をひとつのファイルにまとめて保存します。機種変更やアプリの更新の前に、念のため書き出しておくと安心です。
</p>
<button className=“kb-submit” style={{ background: COLORS.ink }} onClick={exportData}>
エクスポート（.json をダウンロード）
</button>

```
  <div className="kb-subhead" style={{ marginTop: 30 }}>バックアップから復元する</div>
  <p className="kb-para">
    書き出した .json ファイルを選ぶと、内容を確認したうえで復元します。現在のデータは上書きされるため、必要であれば先にエクスポートしてください。
  </p>
  <input
    ref={fileRef}
    type="file"
    accept="application/json"
    onChange={handleFile}
    className="kb-fileinput"
  />
  <button className="kb-linkbtn" onClick={() => setImportText((t) => (t ? "" : " "))} style={{ marginTop: 14 }}>
    {importText ? "貼り付け欄を閉じる" : "ファイルの代わりにJSONを貼り付ける"}
  </button>
  {importText && (
    <div style={{ marginTop: 10 }}>
      <textarea
        className="kb-textarea"
        placeholder="ここにバックアップJSONの内容を貼り付け"
        value={importText.trim()}
        onChange={(e) => setImportText(e.target.value)}
      />
      <button className="kb-smallbtn" style={{ background: COLORS.credit, marginTop: 8 }} onClick={() => applyImport(importText)}>
        この内容を読み込む
      </button>
    </div>
  )}

  <div className="kb-note">
    記録はこのアプリ専用の保存領域に自動で残るので、次に開いたときもそのまま続きから使えます。とはいえ大切なデータなので、月に一度程度のエクスポートをおすすめします。
  </div>
</div>
